<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cute Character Animation</title>
    <!-- 最新のjQueryを読み込み -->
    <script src="https://jquery.com"></script>
    <style>
        body {
            background: #fff5f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* キャラクターの見た目 */
        .char {
            width: 120px;
            height: 120px;
            background: #ffc1e3;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            /* 初期の動き（ふわふわ） */
            animation: float 2s ease-in-out infinite;
        }

        /* 顔のパーツ */
        .char::before, .char::after {
            content: ""; position: absolute; top: 35%;
            width: 12px; height: 12px; background: #444; border-radius: 50%;
        }
        .char::before { left: 25%; }
        .char::after { right: 25%; }

        /* ほっぺ（クリックで濃くなる） */
        .cheek {
            position: absolute; top: 55%; width: 20px; height: 10px;
            background: #ff85a1; border-radius: 50%; opacity: 0.5;
            transition: 0.3s;
        }
        .cheek.l { left: 15%; }
        .cheek.r { right: 15%; }

        /* アニメーション1：ふわふわ浮遊 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* アニメーション2：ぴょんぴょん跳ねる（jQueryで追加） */
        .jump {
            animation: jump 0.5s ease-in-out infinite !important;
        }
        @keyframes jump {
            0%, 100% { transform: scale(1, 1) translateY(0); }
            50% { transform: scale(0.9, 1.1) translateY(-40px); }
            70% { transform: scale(1.1, 0.9) translateY(0); }
        }
    </style>
</head>
<body>

    <div style="text-align:center;">
        <p>キャラをクリックしてみてね！</p>
        <div id="myChar" class="char">
            <div class="cheek l"></div>
            <div class="cheek r"></div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // キャラクターをクリックした時の処理
            $('#myChar').on('click', function() {
                // 'jump'クラスを付け外しする
                $(this).toggleClass('jump');
                
                // ほっぺの色を濃くする
                if($(this).hasClass('jump')) {
                    $('.cheek').css({ 'opacity': '1', 'background': '#ff4d79' });
                } else {
                    $('.cheek').css({ 'opacity': '0.5', 'background': '#ff85a1' });
                }
            });
        });
    </script>

</body>
</html>
